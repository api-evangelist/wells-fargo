description: Wells Fargo does not publish public rate-limit numbers for its Open Banking APIs. Throughput,
  concurrency, and quota are governed by the partner agreement and the gateway provisioning at
  onboarding; clients see specifics only after access is granted via the developer portal.
notes: Public developer.wellsfargo.com landing confirms partner model; no public rate-limit page found.
sources:
  - https://developer.wellsfargo.com/
responseCodes: {}
limits:
  - name: Partner Throughput
    scope: contract
    metric: varies
    limit: see Wells Fargo partner / treasury agreement
policies:
  - name: Contract-Defined Limits
    description: Per-second / per-minute throughput, daily caps, and concurrency are set during
      partner onboarding and documented in the gated developer portal.
  - name: Idempotency on Payments
    description: Payment-initiation endpoints in Open Banking patterns require idempotency keys; clients
      should retry with the same key on transient failures.
