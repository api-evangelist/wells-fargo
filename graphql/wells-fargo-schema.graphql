"""
Wells Fargo GraphQL Schema
Conceptual schema covering banking, payments, lending, investments, FX, and compliance.
Based on the Wells Fargo Gateway API platform at developer.wellsfargo.com
"""

scalar DateTime
scalar Date
scalar Decimal
scalar JSON
scalar URL

# ─── Enumerations ────────────────────────────────────────────────────────────

enum AccountType {
  CHECKING
  SAVINGS
  CREDIT
  LOAN
  MORTGAGE
  BROKERAGE
  TRUST
  IRA
  CD
  MONEY_MARKET
}

enum AccountStatus {
  ACTIVE
  INACTIVE
  CLOSED
  FROZEN
  PENDING
}

enum TransactionType {
  DEBIT
  CREDIT
  TRANSFER
  PAYMENT
  FEE
  INTEREST
  ADJUSTMENT
  REVERSAL
}

enum TransactionStatus {
  PENDING
  POSTED
  CANCELLED
  REJECTED
  RETURNED
}

enum PaymentRail {
  ACH
  WIRE
  RTP
  FED_NOW
  SWIFT
  ZELLE
  CHECK
}

enum PaymentStatus {
  INITIATED
  PROCESSING
  COMPLETED
  FAILED
  CANCELLED
  RETURNED
}

enum CardType {
  DEBIT
  CREDIT
  PREPAID
  BUSINESS
}

enum CardStatus {
  ACTIVE
  INACTIVE
  LOST
  STOLEN
  EXPIRED
  BLOCKED
}

enum LoanStatus {
  CURRENT
  DELINQUENT
  DEFAULT
  PAID_OFF
  IN_FORBEARANCE
  CLOSED
}

enum ConsentStatus {
  ACTIVE
  REVOKED
  EXPIRED
  PENDING
}

enum WebhookStatus {
  ACTIVE
  INACTIVE
  FAILED
}

# ─── Core Account Types ───────────────────────────────────────────────────────

"""A generic bank account belonging to a customer."""
type Account {
  id: ID!
  accountNumber: String!
  routingNumber: String!
  type: AccountType!
  status: AccountStatus!
  nickname: String
  currency: String!
  openedDate: Date!
  closedDate: Date
  customer: Customer
  balance: AccountBalance
  history: [AccountHistory!]
  statements: [BankStatement!]
  transactions(first: Int, after: String, from: Date, to: Date): TransactionConnection!
}

"""Checking account with overdraft and debit card linkage."""
type CheckingAccount {
  id: ID!
  accountNumber: String!
  routingNumber: String!
  status: AccountStatus!
  currency: String!
  overdraftLimit: Decimal
  overdraftProtectionEnabled: Boolean!
  linkedCard: Card
  balance: AccountBalance
  customer: Customer
  transactions(first: Int, after: String): TransactionConnection!
  directDeposits: [DirectDeposit!]
}

"""Savings account with interest rate and transfer limits."""
type SavingsAccount {
  id: ID!
  accountNumber: String!
  routingNumber: String!
  status: AccountStatus!
  currency: String!
  interestRate: Decimal!
  apy: Decimal!
  monthlyTransferLimit: Int!
  balance: AccountBalance
  customer: Customer
  transactions(first: Int, after: String): TransactionConnection!
}

"""Credit account (credit card or line of credit)."""
type CreditAccount {
  id: ID!
  accountNumber: String!
  status: AccountStatus!
  creditLimit: Decimal!
  availableCredit: Decimal!
  currentBalance: Decimal!
  minimumPaymentDue: Decimal
  paymentDueDate: Date
  apr: Decimal!
  rewardsPoints: Int
  card: Card
  customer: Customer
  transactions(first: Int, after: String): TransactionConnection!
  statements: [BankStatement!]
}

"""Loan account covering mortgage, auto, personal, student, and business loans."""
type LoanAccount {
  id: ID!
  accountNumber: String!
  type: AccountType!
  status: LoanStatus!
  originalAmount: Decimal!
  currentBalance: Decimal!
  interestRate: Decimal!
  apr: Decimal!
  originationDate: Date!
  maturityDate: Date!
  nextPaymentDate: Date
  nextPaymentAmount: Decimal
  customer: Customer
  paymentHistory: [Transaction!]
}

# ─── Balances & History ───────────────────────────────────────────────────────

"""Point-in-time balance for an account."""
type AccountBalance {
  accountId: ID!
  ledgerBalance: Decimal!
  availableBalance: Decimal!
  pendingDebits: Decimal!
  pendingCredits: Decimal!
  floatBalance: Decimal
  asOf: DateTime!
  currency: String!
}

"""Historical daily balance record."""
type AccountHistory {
  accountId: ID!
  date: Date!
  openingBalance: Decimal!
  closingBalance: Decimal!
  totalCredits: Decimal!
  totalDebits: Decimal!
  currency: String!
}

# ─── Transactions ─────────────────────────────────────────────────────────────

"""A paginated list of transactions."""
type TransactionConnection {
  edges: [TransactionEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type TransactionEdge {
  node: Transaction!
  cursor: String!
}

"""A single transaction record on an account."""
type Transaction {
  id: ID!
  transactionId: String!
  accountId: ID!
  type: TransactionType!
  status: TransactionStatus!
  amount: Decimal!
  currency: String!
  description: String!
  memo: String
  postedDate: DateTime
  transactionDate: DateTime!
  valueDate: Date
  rail: PaymentRail
  referenceNumber: String
  checkNumber: String
  merchantName: String
  merchantCategory: String
  detail: TransactionDetail
}

"""Extended detail for a transaction including party information."""
type TransactionDetail {
  transactionId: ID!
  originatingAccountId: String
  receivingAccountId: String
  originatingParty: String
  receivingParty: String
  originatingRoutingNumber: String
  receivingRoutingNumber: String
  traceNumber: String
  imad: String
  omad: String
  wireType: String
  purpose: String
  remittanceInfo: String
  batchId: String
  companyEntryDescription: String
  individuaIdentificationNumber: String
}

# ─── Payments & Transfers ─────────────────────────────────────────────────────

"""A generic fund transfer between accounts."""
type Transfer {
  id: ID!
  fromAccountId: ID!
  toAccountId: ID!
  amount: Decimal!
  currency: String!
  status: PaymentStatus!
  scheduledDate: Date
  completedDate: DateTime
  memo: String
  referenceId: String
  rail: PaymentRail!
}

"""ACH credit or debit transaction."""
type ACH {
  id: ID!
  companyId: String!
  companyName: String!
  companyEntryDescription: String
  effectiveDate: Date!
  settlementDate: Date
  amount: Decimal!
  currency: String!
  transactionCode: String!
  receivingAccountNumber: String!
  receivingRoutingNumber: String!
  receivingName: String!
  traceNumber: String
  status: PaymentStatus!
  sameDayACH: Boolean!
  returnCode: String
  createdAt: DateTime!
}

"""Domestic or international wire transfer."""
type Wire {
  id: ID!
  senderAccountId: ID!
  senderName: String!
  beneficiaryName: String!
  beneficiaryAccountNumber: String!
  beneficiaryBankBIC: String
  beneficiaryBankName: String
  beneficiaryBankAddress: String
  amount: Decimal!
  currency: String!
  exchangeRate: Decimal
  usdEquivalent: Decimal
  valueDate: Date!
  status: PaymentStatus!
  imad: String
  omad: String
  purpose: String
  remittanceInfo: String
  isInternational: Boolean!
  createdAt: DateTime!
}

"""Physical check payment."""
type Check {
  id: ID!
  accountId: ID!
  checkNumber: String!
  payeeName: String!
  amount: Decimal!
  currency: String!
  memo: String
  issueDate: Date
  clearDate: Date
  status: TransactionStatus!
  frontImageUrl: URL
  backImageUrl: URL
}

"""Electronic bill payment."""
type Payment {
  id: ID!
  accountId: ID!
  payeeId: ID!
  payee: Payee!
  amount: Decimal!
  currency: String!
  scheduledDate: Date!
  processedDate: DateTime
  status: PaymentStatus!
  confirmationNumber: String
  memo: String
}

"""Bill payment transaction linked to a payee."""
type BillPayment {
  id: ID!
  payment: Payment!
  billAccountNumber: String!
  billDueDate: Date
  minimumPayment: Decimal
  statementBalance: Decimal
  isAutoPay: Boolean!
}

"""Registered bill payee."""
type Payee {
  id: ID!
  name: String!
  accountNumber: String
  address: Address
  phoneNumber: String
  payeeType: String
  isVerified: Boolean!
  isActive: Boolean!
  addedDate: Date!
}

"""Direct deposit enrollment record."""
type DirectDeposit {
  id: ID!
  accountId: ID!
  employerName: String!
  routingNumber: String!
  accountNumber: String!
  amount: Decimal
  isFullDeposit: Boolean!
  startDate: Date!
  status: String!
}

"""Stop payment request on a check."""
type StopPayment {
  id: ID!
  accountId: ID!
  checkNumber: String
  checkNumberRangeStart: String
  checkNumberRangeEnd: String
  amount: Decimal
  payeeName: String
  reason: String!
  requestedDate: DateTime!
  expirationDate: Date!
  confirmationNumber: String!
  status: String!
  fee: Decimal
}

# ─── Cards ────────────────────────────────────────────────────────────────────

"""Debit or credit card linked to an account."""
type Card {
  id: ID!
  accountId: ID!
  cardType: CardType!
  lastFourDigits: String!
  expirationMonth: Int!
  expirationYear: Int!
  nameOnCard: String!
  status: CardStatus!
  issuedDate: Date!
  limits: CardLimit!
  transactions(first: Int, after: String): TransactionConnection!
}

"""Spending and withdrawal limits for a card."""
type CardLimit {
  cardId: ID!
  dailyPurchaseLimit: Decimal!
  dailyATMWithdrawalLimit: Decimal!
  dailyCashAdvanceLimit: Decimal
  singleTransactionLimit: Decimal
  internationalEnabled: Boolean!
  contactlessEnabled: Boolean!
}

"""A transaction charged to a card."""
type CardTransaction {
  id: ID!
  cardId: ID!
  merchantName: String!
  merchantCategory: String
  merchantCity: String
  merchantState: String
  merchantCountry: String!
  amount: Decimal!
  currency: String!
  localAmount: Decimal
  localCurrency: String
  exchangeRate: Decimal
  transactionDate: DateTime!
  postedDate: DateTime
  status: TransactionStatus!
  isInternational: Boolean!
  authorizationCode: String
}

