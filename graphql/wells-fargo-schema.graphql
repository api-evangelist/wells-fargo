  combinedServiceIndicator: Boolean!
}

"""Customer consent for data sharing or payment initiation."""
type Consent {
  id: ID!
  customerId: ID!
  tppId: String!
  tppName: String!
  status: ConsentStatus!
  permissions: [String!]!
  createdAt: DateTime!
  expiresAt: DateTime!
  revokedAt: DateTime
  accounts: [String!]!
  transactionFromDate: Date
  transactionToDate: Date
}

"""Account statement resource for open banking."""
type Statement {
  id: ID!
  accountId: ID!
  statementId: String!
  startDate: Date!
  endDate: Date!
  creationDate: DateTime!
  type: String!
}

# ─── Pagination ───────────────────────────────────────────────────────────────

type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
}

# ─── Root Operations ──────────────────────────────────────────────────────────

type Query {
  # Accounts
  account(id: ID!): Account
  accounts(customerId: ID!, type: AccountType): [Account!]!
  checkingAccount(id: ID!): CheckingAccount
  savingsAccount(id: ID!): SavingsAccount
  creditAccount(id: ID!): CreditAccount
  loanAccount(id: ID!): LoanAccount
  accountBalance(accountId: ID!): AccountBalance
  accountHistory(accountId: ID!, from: Date!, to: Date!): [AccountHistory!]!

  # Transactions
  transaction(id: ID!): Transaction
  transactions(accountId: ID!, first: Int, after: String, from: Date, to: Date, type: TransactionType): TransactionConnection!
  transactionDetail(transactionId: ID!): TransactionDetail

  # Payments
  transfer(id: ID!): Transfer
  ach(id: ID!): ACH
  wire(id: ID!): Wire
  check(id: ID!): Check
  payment(id: ID!): Payment
  billPayment(id: ID!): BillPayment
  payees(customerId: ID!): [Payee!]!
  stopPayment(id: ID!): StopPayment

  # Cards
  card(id: ID!): Card
  cards(accountId: ID!): [Card!]!
  cardTransactions(cardId: ID!, first: Int, after: String): TransactionConnection!

  # Lending
  mortgage(id: ID!): Mortgage
  homeEquity(id: ID!): HomeEquity
  autoLoan(id: ID!): AutoLoan
  personalLoan(id: ID!): PersonalLoan
  studentLoan(id: ID!): StudentLoan
  businessLoan(id: ID!): BusinessLoan

  # FX & Trade Finance
  fxRate(baseCurrency: String!, quoteCurrency: String!): FXRate
  fxTransaction(id: ID!): FXTransaction
  tradeFinance(id: ID!): TradeFinance
  letterOfCredit(id: ID!): LetterOfCredit
  bankGuarantee(id: ID!): BankGuarantee

  # Specialty
  safeDeposit(id: ID!): SafeDeposit
  trustAccount(id: ID!): TrustAccount

  # Investments
  brokerage(id: ID!): Brokerage
  investment(id: ID!): Investment
  bond(id: ID!): Bond
  mutualFund(id: ID!): MutualFund
  cd(id: ID!): CD
  annuity(id: ID!): Annuity
  retirement(id: ID!): Retirement
  ira(id: ID!): IRA

  # Customers
  customer(id: ID!): Customer
  businessCustomer(id: ID!): BusinessCustomer

  # Branch & ATM
  branch(id: ID!): Branch
  branches(postalCode: String, city: String, state: String, radius: Int): [Branch!]!
  atm(id: ID!): ATM
  atms(postalCode: String, city: String, state: String, radius: Int, surchargeFreee: Boolean): [ATM!]!

  # Documents
  bankStatement(id: ID!): BankStatement
  bankStatements(accountId: ID!, year: Int): [BankStatement!]!
  taxDocument(id: ID!): TaxDocument
  taxDocuments(customerId: ID!, taxYear: Int): [TaxDocument!]!

  # Compliance
  complianceRecord(id: ID!): ComplianceRecord
  consent(id: ID!): Consent
  consents(customerId: ID!): [Consent!]!

  # API Access
  apiKey(id: ID!): APIKey
  apiKeys(clientId: String!): [APIKey!]!
  webhooks(clientId: String!): [Webhook!]!
  oauthToken(id: ID!): OAuthToken
}

type Mutation {
  # Transfers & Payments
  initiateTransfer(fromAccountId: ID!, toAccountId: ID!, amount: Decimal!, currency: String!, scheduledDate: Date, memo: String, rail: PaymentRail): Transfer!
  initiateACH(input: ACHInput!): ACH!
  initiateWire(input: WireInput!): Wire!
  issueStopPayment(accountId: ID!, checkNumber: String, amount: Decimal, payeeName: String, reason: String!): StopPayment!
  schedulePayment(accountId: ID!, payeeId: ID!, amount: Decimal!, scheduledDate: Date!, memo: String): Payment!
  addPayee(name: String!, accountNumber: String, address: AddressInput): Payee!

  # FX
  quoteFXRate(baseCurrency: String!, quoteCurrency: String!, amount: Decimal!): FXRate!
  executeFXTransaction(quoteId: String!, debitAccountId: ID!, creditAccountId: ID!): FXTransaction!

  # Cards
  activateCard(cardId: ID!): Card!
  blockCard(cardId: ID!, reason: String!): Card!
  updateCardLimits(cardId: ID!, dailyPurchaseLimit: Decimal, dailyATMWithdrawalLimit: Decimal, internationalEnabled: Boolean): CardLimit!

  # Consents & OAuth
  createConsent(tppId: String!, permissions: [String!]!, expiresAt: DateTime!, accounts: [String!]): Consent!
  revokeConsent(consentId: ID!): Consent!
  revokeOAuthToken(tokenId: ID!): OAuthToken!

  # Webhooks
  createWebhook(url: URL!, events: [String!]!, headers: JSON): Webhook!
  updateWebhook(id: ID!, url: URL, events: [String!], status: WebhookStatus): Webhook!
  deleteWebhook(id: ID!): Boolean!

  # API Keys
  createAPIKey(name: String!, scopes: [String!]!, expiresAt: DateTime, ipWhitelist: [String!]): APIKey!
  revokeAPIKey(id: ID!): APIKey!
}

type Subscription {
  transactionPosted(accountId: ID!): Transaction!
  paymentStatusChanged(paymentId: ID!): Payment!
  transferStatusChanged(transferId: ID!): Transfer!
  achStatusChanged(achId: ID!): ACH!
  wireStatusChanged(wireId: ID!): Wire!
  fxRateUpdated(baseCurrency: String!, quoteCurrency: String!): FXRate!
  consentStatusChanged(consentId: ID!): Consent!
  cardTransactionPosted(cardId: ID!): CardTransaction!
}

