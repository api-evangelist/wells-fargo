naftiko: 1.0.0-alpha2
info:
  label: Wells Fargo Gateway API — Payments
  description: 'Wells Fargo Gateway API — Payments. 2 operations. Lead operation: List payments. Self-contained Naftiko capability
    covering one Wells Fargo business surface.'
  tags:
  - Wells Fargo
  - Payments
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WELLS_FARGO_API_KEY: WELLS_FARGO_API_KEY
capability:
  consumes:
  - type: http
    namespace: gateway-payments
    baseUri: https://api.wellsfargo.com
    description: Wells Fargo Gateway API — Payments business capability. Self-contained, no shared references.
    resources:
    - name: payments
      path: /payments
      operations:
      - name: listpayments
        method: GET
        description: List payments
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createpayment
        method: POST
        description: Create a payment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.WELLS_FARGO_API_KEY}}'
  exposes:
  - type: rest
    namespace: gateway-payments-rest
    port: 8080
    description: REST adapter for Wells Fargo Gateway API — Payments. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/payments
      name: payments
      description: REST surface for payments.
      operations:
      - method: GET
        name: listpayments
        description: List payments
        call: gateway-payments.listpayments
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createpayment
        description: Create a payment
        call: gateway-payments.createpayment
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: gateway-payments-mcp
    port: 9090
    transport: http
    description: MCP adapter for Wells Fargo Gateway API — Payments. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-payments
      description: List payments
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: gateway-payments.listpayments
      outputParameters:
      - type: object
        mapping: $.
    - name: create-payment
      description: Create a payment
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: gateway-payments.createpayment
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
