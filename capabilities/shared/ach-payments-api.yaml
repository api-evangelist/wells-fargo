naftiko: "1.0.0-alpha1"

info:
  label: "Wells Fargo ACH Payments API"
  description: >-
    ACH payment initiation API enabling commercial banking customers to submit
    individual and batch ACH credit and debit transactions, including same-day
    ACH, with intelligent payment routing across RTP, FedNow, and standard ACH rails.
  tags:
    - Banking
    - Financial Services
    - Payments
    - ACH
    - Treasury Management
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      WELLS_FARGO_ACH_TOKEN: WELLS_FARGO_ACH_TOKEN

capability:
  consumes:
    - type: http
      namespace: wells-fargo-ach
      baseUri: https://api.wellsfargo.com
      description: "Wells Fargo ACH Payments API."
      authentication:
        type: bearer
        token: "{{WELLS_FARGO_ACH_TOKEN}}"
      resources:
        - name: ach-payments
          path: /v2/ach/payments
          description: ACH payment initiation and management.
          operations:
            - name: initiate-ach-payment
              method: POST
              description: "Initiate a single ACH credit or debit transaction."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  debitAccountId: "{{tools.debit_account_id}}"
                  amount: "{{tools.amount}}"
                  currency: "{{tools.currency}}"
                  creditAccountNumber: "{{tools.credit_account_number}}"
                  creditRoutingNumber: "{{tools.credit_routing_number}}"
                  creditAccountType: "{{tools.credit_account_type}}"
                  transactionCode: "{{tools.transaction_code}}"
                  receiverName: "{{tools.receiver_name}}"
                  addendaInformation: "{{tools.addenda}}"
                  sameDayAch: "{{tools.same_day}}"
                  effectiveDate: "{{tools.effective_date}}"

            - name: list-ach-payments
              method: GET
              description: "List ACH payments."
              inputParameters:
                - name: startDate
                  in: query
                  type: string
                  required: false
                  description: "Start date filter."
                - name: endDate
                  in: query
                  type: string
                  required: false
                  description: "End date filter."
                - name: status
                  in: query
                  type: string
                  required: false
                  description: "Status filter."
                - name: pageSize
                  in: query
                  type: integer
                  required: false
                  description: "Page size."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-ach-payment
              method: GET
              description: "Get ACH payment status and details."
              inputParameters:
                - name: paymentId
                  in: path
                  type: string
                  required: true
                  description: "ACH payment ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: cancel-ach-payment
              method: DELETE
              description: "Cancel a pending ACH payment."
              inputParameters:
                - name: paymentId
                  in: path
                  type: string
                  required: true
                  description: "ACH payment ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: ach-batches
          path: /v2/ach/batches
          description: Batch ACH payment file submission.
          operations:
            - name: submit-ach-batch
              method: POST
              description: "Submit a batch ACH payment file."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  companyName: "{{tools.company_name}}"
                  effectiveDate: "{{tools.effective_date}}"
                  transactions: "{{tools.transactions}}"

        - name: ach-returns
          path: /v2/ach/returns
          description: ACH return and NOC processing.
          operations:
            - name: list-ach-returns
              method: GET
              description: "List ACH returns and NOCs."
              inputParameters:
                - name: startDate
                  in: query
                  type: string
                  required: false
                  description: "Start date."
                - name: endDate
                  in: query
                  type: string
                  required: false
                  description: "End date."
                - name: returnType
                  in: query
                  type: string
                  required: false
                  description: "Return type (RETURN or NOC)."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8102
      namespace: wells-fargo-ach-rest
      resources:
        - path: /v1/ach-payments
          name: ach-payments
          operations:
            - method: GET
              name: list-ach-payments
              description: "List ACH payments."
              call: "wells-fargo-ach.list-ach-payments"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: initiate-ach-payment
              description: "Initiate ACH payment."
              call: "wells-fargo-ach.initiate-ach-payment"
              with:
                debit_account_id: "rest.debitAccountId"
                amount: "rest.amount"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/ach-batches
          name: ach-batches
          operations:
            - method: POST
              name: submit-batch
              description: "Submit ACH batch."
              call: "wells-fargo-ach.submit-ach-batch"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/ach-returns
          name: ach-returns
          operations:
            - method: GET
              name: list-returns
              description: "List ACH returns."
              call: "wells-fargo-ach.list-ach-returns"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9102
      namespace: wells-fargo-ach-mcp
      transport: http
      tools:
        - name: initiate-ach-payment
          description: "Initiate a single ACH credit or debit payment via Wells Fargo."
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "wells-fargo-ach.initiate-ach-payment"
          with:
            debit_account_id: "tools.debit_account_id"
            amount: "tools.amount"
            currency: "tools.currency"
            credit_account_number: "tools.credit_account_number"
            credit_routing_number: "tools.credit_routing_number"
            receiver_name: "tools.receiver_name"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-ach-payments
          description: "List ACH payment history and status for the authenticated customer."
          hints:
            readOnly: true
            openWorld: false
          call: "wells-fargo-ach.list-ach-payments"
          with:
            startDate: "tools.start_date"
            endDate: "tools.end_date"
            status: "tools.status"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-ach-payment-status
          description: "Get current status and details of an ACH payment."
          hints:
            readOnly: true
            openWorld: false
          call: "wells-fargo-ach.get-ach-payment"
          with:
            paymentId: "tools.payment_id"
          outputParameters:
            - type: object
              mapping: "$."

        - name: cancel-ach-payment
          description: "Cancel a pending ACH payment that has not yet been submitted."
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "wells-fargo-ach.cancel-ach-payment"
          with:
            paymentId: "tools.payment_id"
          outputParameters:
            - type: object
              mapping: "$."

        - name: submit-ach-batch
          description: "Submit a batch ACH payment file with multiple transactions."
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "wells-fargo-ach.submit-ach-batch"
          with:
            company_name: "tools.company_name"
            effective_date: "tools.effective_date"
            transactions: "tools.transactions"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-ach-returns
          description: "List ACH returns and Notifications of Change (NOC) for the authenticated customer."
          hints:
            readOnly: true
            openWorld: false
          call: "wells-fargo-ach.list-ach-returns"
          with:
            startDate: "tools.start_date"
            endDate: "tools.end_date"
            returnType: "tools.return_type"
          outputParameters:
            - type: object
              mapping: "$."
