description: Wells Fargo operates a developer portal (developer.wellsfargo.com) advertising Open
  Banking APIs across Payments and Data, but published consumption is partner-only. There is no
  public, self-serve developer plan with per-call pricing or tiered quotas; access requires a banking
  / treasury / fintech relationship and an executed API agreement with Wells Fargo.
notes: developer.wellsfargo.com confirms an Open Banking API portal (Payments and Data) but does not
  expose per-tier pricing. Scaffold reduced to one Contact Sales plan reflecting partner-led access.
sources:
  - https://developer.wellsfargo.com/
plans:
  - id: wells-fargo-contact-sales
    name: Contact Sales
    type: enterprise
    description: Partner / treasury access to Wells Fargo Open Banking APIs (Payments and Data),
      negotiated through the bank's treasury management or developer-relations team. Pricing is
      bilateral and bundled into the treasury / commercial-banking relationship.
    entries:
      - label: Partner Agreement
        name: partner_agreement
        type: flat
        metric: varies
        limit: -1
        timeFrame: usage
        geo: US
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Open Banking - Payments APIs
      - name: Open Banking - Data APIs
      - name: Treasury / Commercial Banking Relationship
      - name: Developer Portal Access (post-onboarding)
