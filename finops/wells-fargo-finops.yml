description: FinOps placement for Wells Fargo Open Banking APIs. Cost is bundled into the treasury /
  commercial-banking relationship rather than published as per-call API pricing; FOCUS mapping
  reflects bank-fee billing.
notes: No public per-call price list. FOCUS columns reflect the treasury / commercial-banking invoice
  shape only.
sources:
  - https://developer.wellsfargo.com/
billingModel:
  pricingCategory: Bank Fees / Partner Agreement
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
focusColumns:
  ServiceName: Wells Fargo Open Banking APIs
  ServiceCategory: Banking / Open Banking
  ProviderName: Wells Fargo
  PublisherName: Wells Fargo Bank, N.A.
  InvoiceIssuerName: Wells Fargo Bank, N.A.
  BillingCurrency: USD
meters:
  - name: payment_transactions
    description: Count of payment-initiation / wire / ACH calls executed via the Open Banking
      Payments APIs; priced through the treasury services schedule.
    unit: transaction
    aggregation: sum
    dimensions:
      - rail
      - account
  - name: data_calls
    description: Count of account-information / balance / transaction-history calls via the Open
      Banking Data APIs; pricing depends on the partner agreement.
    unit: request
    aggregation: sum
    dimensions:
      - product
      - account
principles:
  - name: Visibility
    description: Spend visibility is via the Wells Fargo Commercial Electronic Office (CEO) account
      analysis statement and any partner-portal reporting provisioned at onboarding.
  - name: Allocation
    description: Allocate API-driven banking spend by account, legal entity, or product line using
      the Wells Fargo account hierarchy and your internal cost-center tags on the integrating
      application.
  - name: Optimization
    description: Cost levers are payment-rail selection (ACH vs wire vs RTP), batching, and renegotiation
      of the treasury services schedule; idempotency on payments avoids duplicate-charge incidents.
  - name: Accountability
    description: Treasury operations and the bank's relationship manager hold accountability;
      engineering owns idempotency, retry, and reconciliation hygiene.
maintainers:
